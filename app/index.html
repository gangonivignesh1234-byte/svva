    /* Step counter via DeviceMotionEvent */
    function useStepCounter() {
      const todayKey = new Date().toDateString();
      const [data, setData] = useState(() => {
        const saved = S.get('steps', { count:0, date:'' });
        return saved.date === todayKey ? saved : { count:0, date:todayKey };
      });
      const lastMag  = useRef(0);
      const lastTime = useRef(0);
      const [permDenied, setPermDenied] = useState(false);

      const startListening = useCallback(() => {
        const handler = e => {
          const a = e.accelerationIncludingGravity;
          if (!a || a.x == null) return;
          const mag = Math.sqrt(a.x*a.x + a.y*a.y + a.z*a.z);
          const now = Date.now();
          if (mag > 11.5 && lastMag.current <= 11.5 && now - lastTime.current > 280) {
            setData(prev => {
              const next = { count: prev.count + 1, date: todayKey };
              S.set('steps', next);
              return next;
            });
            lastTime.current = now;
          }
          lastMag.current = mag;
        };
        window.addEventListener('devicemotion', handler, { passive:true });
        return () => window.removeEventListener('devicemotion', handler);
      }, []);

      useEffect(() => {
        if (typeof DeviceMotionEvent === 'undefined') return;
        if (typeof DeviceMotionEvent.requestPermission === 'function') {
          // iOS 13+ — caller triggers via requestStepPermission()
          return;
        }
        return startListening();
      }, []);

      const requestStepPermission = useCallback(() => {
        if (typeof DeviceMotionEvent?.requestPermission === 'function') {
          DeviceMotionEvent.requestPermission()
            .then(r => { if (r === 'granted') startListening(); else setPermDenied(true); })
            .catch(() => setPermDenied(true));
        }
      }, [startListening]);

      return {
        steps:    data.count,
        calories: Math.round(data.count * 0.04),
        km:       parseFloat((data.count * 0.0008).toFixed(2)),
        permDenied,
        requestStepPermission,
      };
    }

    /* Countdown / count-up timer */
    function useTimer(initialSeconds = 0, countDown = false) {
      const [elapsed, setElapsed]   = useState(initialSeconds);
      const [running, setRunning]   = useState(false);
      const intervalRef = useRef(null);

      useEffect(() => {
        if (!running) { clearInterval(intervalRef.current); return; }
        intervalRef.current = setInterval(() => {
          setElapsed(prev => {
            if (countDown && prev <= 0) { setRunning(false); return 0; }
            return countDown ? prev - 1 : prev + 1;
          });
        }, 1000);
        return () => clearInterval(intervalRef.current);
      }, [running, countDown]);

      const fmt = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
      return {
        elapsed, running,
        display: fmt(elapsed),
        toggle:  () => setRunning(r => !r),
        reset:   (v = initialSeconds) => { setRunning(false); setElapsed(v); },
        setElapsed,
      };
    }

    /* Voice recognition — Web Speech API */
    function useSpeech() {
      const [transcript, setTranscript] = useState('');
      const [listening,  setListening]  = useState(false);
      const [supported,  setSupported]  = useState(false);
      const recRef = useRef(null);

      useEffect(() => {
        setSupported(!!(window.SpeechRecognition || window.webkitSpeechRecognition));
      }, []);

      const start = useCallback(() => {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) return;
        const rec = new SR();
        rec.lang = 'en-IN';
        rec.continuous = false;
        rec.interimResults = false;
        rec.onresult = e => { setTranscript(e.results[0][0].transcript); setListening(false); };
        rec.onerror  = ()  => setListening(false);
        rec.onend    = ()  => setListening(false);
        recRef.current = rec;
        rec.start();
        setListening(true);
      }, []);

      const stop = useCallback(() => {
        recRef.current?.stop();
        setListening(false);
      }, []);

      return { transcript, listening, supported, start, stop, setTranscript };
    }

    /* Body fat — Navy method (male) */
    const calcBodyFat = (height_cm, waist_cm, neck_cm) => {
      if (!height_cm || !waist_cm || !neck_cm || waist_cm <= neck_cm) return null;
      const bf = 86.010 * Math.log10(waist_cm - neck_cm) - 70.041 * Math.log10(height_cm) + 36.76;
      return parseFloat(Math.max(3, Math.min(50, bf)).toFixed(1));
    };

      return { weeks_fast: Math.ceil(diff / 1.0), weeks_safe: Math.ceil(diff / 0.5) };

    function MiniLineChart({ data=[], height=50, color='#F4E4C1', filled=false }) {
      if (!data.length) return null;
      const max = Math.max(...data), min = Math.min(...data), range = max - min || 1;
      const pts = data.map((v,i) => {
        const x = (i/(data.length-1)) * 100;
        const y = 100 - ((v-min)/range) * 90 - 5;
        return `${x},${y}`;
      }).join(' ');
      const fillPts = `0,100 ${pts} 100,100`;
      return (
        <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{ width:'100%', height, display:'block' }}>
          {filled && <polygon points={fillPts} fill={color} opacity="0.08"/>}
          <polyline points={pts} fill="none" stroke={color} strokeWidth="2" vectorEffect="non-scaling-stroke"/>

        </svg>
      );

            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--border-soft)" strokeWidth={stroke}/>
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
              strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
              style={{ transition:'stroke-dashoffset .5s ease' }}/>
          </svg>
          <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center' }}>

    function FastingCard() {
      const [f, setF] = useState(() => {
        const saved = S.get('fasting', { active:false, start:null });
        return saved;
      });
      const [now, setNow] = useState(Date.now());
      const target = 16 * 3600000;

      useEffect(() => {
        if (!f.active) return;
        const t = setInterval(() => setNow(Date.now()), 10000);
        return () => clearInterval(t);
      }, [f.active]);

      const elapsed = f.active && f.start ? Math.max(0, now - f.start) : 0;
      const pct = Math.min(100, (elapsed / target) * 100);
      const hh = Math.floor(elapsed / 3600000);
      const mm = Math.floor((elapsed % 3600000) / 60000);

      const toggle = () => {
        const n = f.active ? { active:false, start:null } : { active:true, start:Date.now() };
        setF(n); S.set('fasting', n);
      };

      return (
        <GlassCard style={{ padding:20, marginBottom:12 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
            <div>
              <div style={{ fontSize:10, textTransform:'uppercase', letterSpacing:'0.18em', color:'var(--text-faint)' }}>Intermittent Fast</div>
              <div className="serif" style={{ fontSize:28, lineHeight:1, marginTop:4, color: elapsed>=target?'var(--green)':'var(--gold)' }}>
                {hh}h {String(mm).padStart(2,'0')}m
              </div>
            </div>
            <button onClick={toggle} style={{
              padding:'8px 16px', borderRadius:999, fontSize:12, fontWeight:500, cursor:'pointer', border:'none',
              background: f.active ? 'rgba(244,228,193,0.2)' : 'linear-gradient(135deg,var(--gold),var(--gold-deep))',
              color: f.active ? 'var(--gold)' : '#1a0f00',
            }}>
              {f.active ? '⏸ Eating' : '▶ Fast'}
            </button>
          </div>
          <ProgressBar value={elapsed} max={target} color={elapsed>=target?'var(--green)':'var(--gold)'}/>
          <div style={{ display:'flex', justifyContent:'space-between', fontSize:10, color:'var(--text-faint)', marginTop:6 }}>
            <span>0h</span>
            <span>16h target {elapsed>=target?'✓ Done!':''}</span>
          </div>
        </GlassCard>
      );
    }

    /* ── PHASE 3: QUICK STATS ROW (horizontal scroll) ───────────── */
    function QuickStatsRow({ stepData }) {
      const stepsCount = stepData?.count || S.get('steps', { count:0 }).count || 0;
      const stepsGoal  = 10000;
      const calIn      = getTodayCaloriesIn();
      const calBurnt   = Math.round(stepsCount * 0.04 + (S.get('activeCalories', 0) || 0));
      const water      = (() => {
        const w = S.get('water', null);
        if (!w) return { liters:0, goal:3 };
        if ('liters' in w) return w;
        return { liters:(w.glasses||0) * 0.25, goal:3 };
      })();
      const fasting    = S.get('fasting', { active:false, start:null });
      const fastingMs  = fasting.active && fasting.start ? Date.now() - fasting.start : 0;
      const fastingHours = Math.floor(fastingMs / 3600000);
      const fastingMins  = Math.floor((fastingMs % 3600000) / 60000);

      const stats = [
        { key:'steps', icon:'Footprints', color:'var(--orange)', label:'Steps',
          value: stepsCount.toLocaleString(), sub: `of ${stepsGoal.toLocaleString()}`,
          progress: Math.min(1, stepsCount / stepsGoal) },
        { key:'calIn', icon:'Flame', color:'var(--red)', label:'Calories In',
          value: calIn.toLocaleString(), sub: 'today · food log',
          progress: null, mono:true },
        { key:'calOut', icon:'Activity', color:'var(--green)', label:'Calories Burnt',
          value: calBurnt.toLocaleString(), sub: 'from activity',
          progress: null, mono:true },
        { key:'water', icon:'Droplets', color:'var(--blue)', label:'Water',
          value: `${water.liters.toFixed(1)}L`, sub: `of ${water.goal}L`,
          progress: Math.min(1, water.liters / water.goal),
          action: () => {
            const next = { ...water, liters: Math.round((water.liters + 0.5) * 10) / 10 };
            if (next.liters > water.goal + 1) next.liters = 0; // tap-cycle reset
            S.set('water', next);
            window.location.reload();
          },
          actionLabel:'+0.5L' },
        { key:'fast', icon:'Clock', color:'var(--gold)', label:'Fasting',
          value: fasting.active ? `${fastingHours}h ${String(fastingMins).padStart(2,'0')}m` : '—',
          sub: fasting.active ? '16h target' : 'not active',
          progress: fasting.active ? Math.min(1, fastingMs / (16*3600000)) : null, mono:true },
      ];

      return (
        <div style={{ marginTop:18 }}>
          <div className="scroll-x no-bar" style={{ display:'flex', gap:10, padding:'0 20px 4px' }}>
            {stats.map(s => (
              <div key={s.key} style={{
                flexShrink:0, width:138, minHeight:108,
                padding:'12px 14px',
                background:'var(--bg-card)',
                border:'0.5px solid var(--border-soft)',
                borderRadius:16,
                display:'flex', flexDirection:'column', justifyContent:'space-between',
                position:'relative',
              }}>
                <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                  <Icon name={s.icon} size={16} strokeWidth={1.5} style={{ color:s.color }}/>
                  {s.action && <button onClick={s.action} style={{ background:'transparent', border:'none', color:s.color, fontSize:10, fontWeight:600, cursor:'pointer', padding:0 }}>{s.actionLabel}</button>}
                </div>
                <div>
                  <div className={s.mono ? 'mono' : ''} style={{ fontSize:22, fontWeight:600, color:s.color, lineHeight:1.1 }}>{s.value}</div>
                  <div style={{ fontSize:10, color:'var(--text-faint)', marginTop:2 }}>{s.sub}</div>
                </div>
                {s.progress !== null && (
                  <div className="bar-track thin-track" style={{ marginTop:4 }}>
                    <div className="bar-fill" style={{ width:`${s.progress*100}%`, background:s.color }}/>

    /* ── PHASE 3: DAILY PROTOCOL STRIP ──────────────────────────── */
    function DailyProtocolStrip({ protocolId }) {
      const items = DAILY_STRIPS[protocolId] || DAILY_STRIPS.code90;
      const todayKey = 'strip_done_' + new Date().toISOString().slice(0,10);
      const [done, setDone] = useState(() => S.get(todayKey, []));

      const toggle = (idx) => {
        const k = `${protocolId}-${idx}`;
        const next = done.includes(k) ? done.filter(d => d !== k) : [...done, k];
        setDone(next);
        S.set(todayKey, next);
      };

      const completedCount = items.filter((_,i) => done.includes(`${protocolId}-${i}`)).length;

      return (
        <div style={{ marginTop:18 }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 20px 8px' }}>
            <div style={{ fontSize:10, textTransform:'uppercase', letterSpacing:'0.18em', color:'var(--text-faint)', fontWeight:500 }}>Today's Protocol</div>
            <div style={{ fontSize:11, color:'var(--text-dim)' }} className="mono">{completedCount}/{items.length}</div>
          </div>
          <div className="scroll-x no-bar" style={{ display:'flex', gap:10, padding:'0 20px 4px' }}>
            {items.map((item, i) => {

    function SleepMini() {
      const sleep = S.get('sleep', { hours:7.5, quality:80 });
      return (
        <GlassCard style={{ padding:14, marginTop:10 }}>
          <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:8 }}>
            <Icon name="Moon" size={14} strokeWidth={1.5} style={{ color:'var(--purple)' }}/>

          </div>
          <div style={{ fontSize:11, color:'var(--text-dim)', marginTop:6 }}>Quality {sleep.quality}%</div>

    }

    function WeightMini() {
      const w = S.get('weight', { current:0, target:0 });
      const profile = S.get('profile', {});
      const cur = w.current || profile.weight || 0;
      const tgt = w.target  || profile.goalWeight || 0;
      const diff = cur && tgt ? (cur - tgt).toFixed(1) : null;
      return (
        <GlassCard style={{ padding:14, marginTop:10 }}>
          <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:8 }}>
            <Icon name="Scale" size={14} strokeWidth={1.5} style={{ color:'var(--gold)' }}/>
            <div style={{ fontSize:10, textTransform:'uppercase', letterSpacing:'.12em', color:'var(--text-faint)', fontWeight:500 }}>Weight</div>
          </div>
          <div className="serif" style={{ fontSize:28, lineHeight:1, color:'var(--gold)' }}>
            {cur || '—'}<span style={{ fontSize:18, color:'var(--text-faint)' }}>{cur?'kg':''}</span>
          </div>
          <div style={{ fontSize:11, color:'var(--text-dim)', marginTop:6 }}>
            {diff !== null ? `${diff > 0 ? `${diff}kg to go` : 'Goal hit ✓'}` : 'Set in Profile'}
          </div>
        </GlassCard>
      );
    }

    /* ── PART 4: PROTOCOLS SCREEN ────────────────────────────────── */

    function PhaseCard({ phase, protocolId, phaseIndex }) {
      const key = `tasks_${protocolId}_${phaseIndex}`;
      const [done, setDone] = useState(() => S.get(key, []));

      const toggle = task => {
        const next = done.includes(task) ? done.filter(t => t !== task) : [...done, task];
        setDone(next);
        S.set(key, next);
      };

      return (
        <GlassCard style={{ padding:20, marginBottom:12 }}>
          <div style={{ marginBottom:14 }}>
            <div style={{ fontSize:10, textTransform:'uppercase', letterSpacing:'0.18em', color:'var(--text-faint)' }}>{phase.range}</div>
            <div className="serif" style={{ fontSize:22, lineHeight:1.1, marginTop:4 }}>{phase.name}</div>
            <div style={{ fontSize:12, color:'var(--text-dim)', marginTop:4 }}>{phase.focus}</div>
          </div>

          <div style={{ display:'flex', justifyContent:'space-between', fontSize:11, color:'var(--text-faint)', marginBottom:10 }}>
            <span>Tasks</span>
            <span>{done.length}/{phase.tasks.length} done</span>
          </div>
          <ProgressBar value={done.length} max={phase.tasks.length} color="var(--gold)"/>

          <div style={{ marginTop:14, display:'flex', flexDirection:'column', gap:8 }}>
            {phase.tasks.map((task, i) => {
              const isDone = done.includes(task);
              return (
                <button key={i} onClick={() => toggle(task)} style={{
                  display:'flex', alignItems:'flex-start', gap:10,
                  background: isDone ? 'rgba(168,213,186,0.10)' : 'var(--bg-card)',
                  border:`0.5px solid ${isDone ? 'rgba(168,213,186,0.3)' : 'var(--border-soft)'}`,
                  borderRadius:12, padding:'10px 12px', cursor:'pointer', textAlign:'left',
                  transition:'all .2s',
                }}>
                  <div style={{
                    width:18, height:18, borderRadius:999, flexShrink:0, marginTop:1,
                    background: isDone ? 'var(--green)' : 'transparent',
                    border:`1.5px solid ${isDone ? 'var(--green)' : 'var(--border)'}`,
                    display:'flex', alignItems:'center', justifyContent:'center',
                  }}>
                    {isDone && <Icon name="Check" size={10} style={{ color:'#1a3d2b' }}/>}
                  </div>
                  <span style={{ fontSize:13, color: isDone ? 'var(--text-dim)' : 'var(--text)', lineHeight:1.4,
                    textDecoration: isDone ? 'line-through' : 'none' }}>
                    {task}
                  </span>
                </button>
              );
            })}
          </div>

          {phase.workout && (
            <div style={{ marginTop:16, paddingTop:14, borderTop:'0.5px solid var(--border-soft)' }}>
              <div style={{ fontSize:10, textTransform:'uppercase', letterSpacing:'0.18em', color:'var(--text-faint)', marginBottom:10 }}>Weekly Workout Split</div>
              {[['Push 💪', phase.workout.push], ['Pull 🏋️', phase.workout.pull], ['Legs 🦵', phase.workout.legs]].map(([label, exercises]) => (
                <div key={label} style={{ marginBottom:10 }}>
                  <div style={{ fontSize:11, fontWeight:600, color:'var(--orange)', marginBottom:6 }}>{label}</div>
                  {exercises.map((ex, i) => (
                    <div key={i} style={{ fontSize:12, color:'var(--text-dim)', padding:'4px 0',
                      borderBottom:'0.5px solid var(--border-soft)' }}>{ex}</div>
                  ))}
                </div>
              ))}
            </div>
          )}
        </GlassCard>
      );
    }

    /* ── PART 5: FOOD SCREEN ─────────────────────────────────────── */

    const todayKey = () => new Date().toISOString().slice(0,10);

    function fuzzyMatch(query, name) {
      const q = query.toLowerCase().trim();
      const n = name.toLowerCase();
      if (!q) return true;
      if (n.includes(q)) return true;
      return q.split('').every(c => n.includes(c));
    }

    function AddFoodModal({ open, onClose, onAdd }) {
      const [mode, setMode]         = useState('text');
      const [query, setQuery]       = useState('');
      const [results, setResults]   = useState([]);
      const [selected, setSelected] = useState(null);
      const [qty, setQty]           = useState(1);
      const [time, setTime]         = useState(() => new Date().toTimeString().slice(0,5));
      const [photoNote, setPhotoNote] = useState('');
      const speech = useSpeech();
      const cameraRef = useRef(null);
      const galleryRef = useRef(null);

      useEffect(() => {
        if (!query) { setResults([]); return; }
        setResults(FOOD_DB.filter(f => fuzzyMatch(query, f.name)).slice(0, 8));
      }, [query]);

      useEffect(() => {
        if (speech.transcript) {
          setQuery(speech.transcript);
          setMode('text');
          speech.setTranscript('');
        }
      }, [speech.transcript]);

      const handlePhoto = e => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          setPhotoNote('');
          setMode('photo-review');
          setSelected({ _photo: reader.result, name:'', cal:0, p:0, c:0, f:0, iron:0, k:0, zn:0, mg:0 });
        };
        reader.readAsDataURL(file);
      };

      const confirmAdd = () => {
        if (!selected) return;
        const entry = {
          id: Date.now(),
          name: selected.name || photoNote || 'Photo meal',
          time,
          qty,
          cal:  Math.round((selected.cal  || 0) * qty),
          p:    parseFloat(((selected.p   || 0) * qty).toFixed(1)),
          c:    parseFloat(((selected.c   || 0) * qty).toFixed(1)),
          f:    parseFloat(((selected.f   || 0) * qty).toFixed(1)),
          iron: parseFloat(((selected.iron|| 0) * qty).toFixed(1)),
          k:    Math.round((selected.k    || 0) * qty),
          zn:   parseFloat(((selected.zn  || 0) * qty).toFixed(1)),
          mg:   Math.round((selected.mg   || 0) * qty),
          photo: selected._photo || null,
          foodId: selected.id || null,
        };
        onAdd(entry);
        setQuery(''); setSelected(null); setQty(1); setMode('text'); setPhotoNote('');
        onClose();
      };

      if (!open) return null;

      return (
        <div className="overlay" onClick={onClose}>
          <div className="modal-sheet pop-in" style={{ maxHeight:'88dvh' }} onClick={e => e.stopPropagation()}>
            <div style={{ padding:'16px 20px 0', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <div className="serif" style={{ fontSize:22, color:'var(--gold)' }}>Log Food</div>
              <button onClick={onClose} style={{ background:'var(--bg-card)', border:'0.5px solid var(--border-soft)', borderRadius:999, width:32, height:32, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' }}>
                <Icon name="X" size={14} style={{ color:'var(--text-dim)' }}/>
              </button>
            </div>

            {/* Mode selector */}
            <div className="h-pills" style={{ padding:'14px 20px 0' }}>
              {[['text','Search','Search'],['camera','Camera','Camera'],['gallery','Gallery','Image'],['voice','Voice','Mic']].map(([m,label,icon]) => (
                <button key={m} onClick={() => { setMode(m); if(m==='camera') cameraRef.current?.click(); if(m==='gallery') galleryRef.current?.click(); if(m==='voice') speech.start(); }}
                  style={{ flexShrink:0, padding:'7px 14px', borderRadius:999, fontSize:12, fontWeight:500, cursor:'pointer',
                    background: mode===m ? 'var(--gold)' : 'var(--bg-card)',
                    color: mode===m ? '#1a0f00' : 'var(--text-dim)',
                    border:`0.5px solid ${mode===m ? 'var(--gold)' : 'var(--border-soft)'}` }}>
                  {label}
                </button>
              ))}
            </div>

            {/* Hidden file inputs */}
            <input ref={cameraRef}  type="file" accept="image/*" capture="environment" style={{ display:'none' }} onChange={handlePhoto}/>
            <input ref={galleryRef} type="file" accept="image/*"                       style={{ display:'none' }} onChange={handlePhoto}/>

            <div style={{ padding:'14px 20px 32px' }}>

                <div style={{ textAlign:'center', padding:'20px 0', color:'var(--red)' }}>
                  <div className="mic-live" style={{ width:56, height:56, borderRadius:999, background:'rgba(255,112,144,0.15)', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 12px' }}>
                    <Icon name="Mic" size={24} style={{ color:'var(--red)' }}/>
                  </div>
                  <div style={{ fontSize:13, color:'var(--text-dim)' }}>Listening… say what you ate</div>
                </div>
              )}

              {/* Photo review */}
              {mode === 'photo-review' && selected?._photo && (
                <div>
                  <img src={selected._photo} alt="meal" style={{ width:'100%', borderRadius:16, maxHeight:200, objectFit:'cover', marginBottom:12 }}/>
                  <div style={{ fontSize:12, color:'var(--text-dim)', marginBottom:8 }}>What did you eat? Search below to match nutrients.</div>
                  <input value={photoNote} onChange={e => { setPhotoNote(e.target.value); setQuery(e.target.value); setMode('text'); }}
                    placeholder="e.g. Dal rice, paneer sabzi…"
                    style={{ width:'100%', padding:'10px 14px', borderRadius:12, background:'var(--bg-card)', border:'0.5px solid var(--border)', color:'var(--text)', fontSize:14, marginBottom:8 }}/>
                </div>

              {/* Text search */}
              {(mode === 'text' || mode === 'photo-review') && !speech.listening && (
                <div>
                  {mode === 'text' && (
                    <input value={query} onChange={e => setQuery(e.target.value)} autoFocus
                      placeholder="Search food… e.g. moong dal, eggs"
                      style={{ width:'100%', padding:'12px 14px', borderRadius:14, background:'var(--bg-card)', border:'0.5px solid var(--border)', color:'var(--text)', fontSize:14, marginBottom:10 }}/>
                  )}

                  {results.length > 0 && !selected && (
                    <div style={{ display:'flex', flexDirection:'column', gap:6, marginBottom:10 }}>
                      {results.map(f => (
                        <button key={f.id} onClick={() => { setSelected(f); setQuery(f.name); setResults([]); }}
                          style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'10px 14px', borderRadius:12, background:'var(--bg-card)', border:'0.5px solid var(--border-soft)', cursor:'pointer', textAlign:'left' }}>
                          <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                            <span style={{ fontSize:20 }}>{f.emoji}</span>
                            <div>
                              <div style={{ fontSize:13, color:'var(--text)' }}>{f.name}</div>
                              <div style={{ fontSize:10, color:'var(--text-faint)' }}>Fe {f.iron}mg · Zn {f.zn}mg · Mg {f.mg}mg</div>
                            </div>
                          </div>
                          <div style={{ fontSize:12, color:'var(--orange)', fontWeight:500 }}>{f.cal} kcal</div>
                        </button>
                      ))}
                    </div>
                  )}

                  {selected && (
                    <div>
                      {/* Selected food card */}
                      <div style={{ padding:'12px 14px', borderRadius:14, background:'rgba(168,213,186,0.08)', border:'0.5px solid rgba(168,213,186,0.3)', marginBottom:14 }}>
                        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
                          <div style={{ fontSize:14, fontWeight:500 }}>{selected.emoji} {selected.name || photoNote}</div>
                          <button onClick={() => { setSelected(null); setQuery(''); }} style={{ fontSize:11, color:'var(--text-faint)', background:'none', border:'none', cursor:'pointer' }}>change</button>
                        </div>
                        <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:8, textAlign:'center' }}>
                          {[['Kcal',selected.cal],['Protein',`${selected.p}g`],['Carbs',`${selected.c}g`],['Fat',`${selected.f}g`]].map(([l,v]) => (
                            <div key={l}>
                              <div style={{ fontSize:9, color:'var(--text-faint)', textTransform:'uppercase' }}>{l}</div>
                              <div style={{ fontSize:15, fontWeight:600, marginTop:2, color:'var(--gold)' }}>{v}</div>
                            </div>
                          ))}
                        </div>
                        <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:6, marginTop:8, textAlign:'center' }}>
                          {[['Iron',`${selected.iron}mg`,'var(--red)'],['K',`${selected.k}mg`,'var(--orange)'],['Zn',`${selected.zn}mg`,'var(--blue)'],['Mg',`${selected.mg}mg`,'var(--purple)']].map(([l,v,c]) => (
                            <div key={l}>

                      <button onClick={confirmAdd} style={{ width:'100%', padding:'13px', borderRadius:14, background:'linear-gradient(135deg,var(--gold),var(--gold-deep))', color:'#1a0f00', fontWeight:600, fontSize:14, border:'none', cursor:'pointer' }}>
                        Add to Log
                      </button>
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>
        </div>
      );

    function MineralBar({ mineral, intake }) {
      const pct = Math.min(100, (intake / mineral.target) * 100);
      const status = pct >= 100 ? 'met' : pct >= 60 ? 'partial' : 'low';
      const statusColor = status === 'met' ? 'var(--green)' : status === 'partial' ? 'var(--orange)' : 'var(--red)';
      return (
        <div style={{ marginBottom:14 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6 }}>

    function PranayamaTab() {
      const [active, setActive] = useState(null);
      const [phase, setPhase]   = useState('inhale');
      const [beat, setBeat]     = useState(0);
      const timer = useTimer(0, false);

      const start = p => { setActive(p); setPhase('inhale'); setBeat(0); timer.reset(0); timer.toggle(); };
      const stop  = () => { timer.reset(0); setActive(null); };

      useEffect(() => {
        if (!active || !timer.running) return;
        const pat = active.pattern;
        const cycle = Object.values(pat).reduce((a,b)=>a+b,0);
        const pos = timer.elapsed % cycle;
        let acc = 0;
        for (const [k,v] of Object.entries(pat)) {
          acc += v;
          if (pos < acc) { setPhase(k); break; }
        }
        setBeat(timer.elapsed);
      }, [timer.elapsed, active, timer.running]);

      const phaseLabel = { inhale:'Inhale', hold:'Hold', exhale:'Exhale', hum:'Hum...', pause:'Rest' };
      const phaseColor = { inhale:'var(--blue)', hold:'var(--purple)', exhale:'var(--green)', hum:'var(--gold)', pause:'var(--text-faint)' };

      return (
        <div>
          <div style={{ fontSize:13, color:'var(--text-faint)', lineHeight:1.6, marginBottom:20 }}>
            5 pranayama techniques with live breathing guidance.
          </div>

          {active && (
            <GlassCard strong style={{ padding:24, marginBottom:16, textAlign:'center' }}>
              <div style={{ fontSize:32, marginBottom:6 }}>{active.emoji}</div>
              <div className="serif" style={{ fontSize:22, color:'var(--gold)', marginBottom:16 }}>{active.name}</div>

              <div className="breathe" style={{ width:100, height:100, borderRadius:999, margin:'0 auto 20px',
                background: `radial-gradient(circle, ${phaseColor[phase]}30, transparent)`,
                border:`2px solid ${phaseColor[phase]}60`,
                display:'flex', alignItems:'center', justifyContent:'center' }}>
                <div style={{ fontSize:16, fontWeight:600, color: phaseColor[phase] }}>{phaseLabel[phase] || phase}</div>
              </div>

              <div className="mono" style={{ fontSize:40, color:'var(--gold)', marginBottom:4 }}>{timer.display}</div>
              <div style={{ fontSize:11, color:'var(--text-faint)', marginBottom:20 }}>
                {Math.floor(active.dur/60)} min session
              </div>
              <ProgressBar value={timer.elapsed} max={active.dur} color={active.color}/>
              <div style={{ marginTop:14, padding:'12px', borderRadius:12, background:'var(--bg-card)', textAlign:'left' }}>
                <div style={{ fontSize:11, color:'var(--text-dim)', lineHeight:1.6 }}>{active.instruction}</div>
              </div>
              <div style={{ display:'flex', gap:10, marginTop:14 }}>
                <button onClick={timer.toggle} style={{ flex:1, padding:'11px', borderRadius:12, background:'var(--bg-card)', border:'0.5px solid var(--border)', color:'var(--text)', fontSize:13, cursor:'pointer' }}>
                  {timer.running ? '⏸ Pause' : '▶ Resume'}
                </button>
                <button onClick={stop} style={{ flex:1, padding:'11px', borderRadius:12, background:`${active.color}20`, border:`0.5px solid ${active.color}40`, color:active.color, fontWeight:600, fontSize:13, cursor:'pointer' }}>
                  ✓ Done
                </button>
              </div>
            </GlassCard>
          )}

          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            {PRANAYAMA.map(p => (
              <GlassCard key={p.id} style={{ padding:18 }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:10 }}>
                  <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                    <span style={{ fontSize:28 }}>{p.emoji}</span>
                    <div>
                      <div style={{ fontSize:14, fontWeight:500 }}>{p.name}</div>
                      <div style={{ fontSize:10, color:'var(--text-faint)', marginTop:2 }}>{Math.floor(p.dur/60)} min</div>
                    </div>
                  </div>
                  <button onClick={() => start(p)}
                    style={{ padding:'7px 16px', borderRadius:999, background:`${p.color}20`, border:`0.5px solid ${p.color}40`, color:p.color, fontWeight:600, fontSize:12, cursor:'pointer', flexShrink:0 }}>

              </GlassCard>

        </div>

        const { weight:wt, height:ht, age, activityLevel:al } = profile;

        const bmr = 10 * wt + 6.25 * ht - 5 * age + 5;
        const m = { sedentary:1.2, light:1.375, moderate:1.55, very:1.725 };

    function GymScreen() {
      const today = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date().getDay()];
      const initialDay = GYM_DAYS.includes(today) ? today : 'Mon';
      const [day, setDay] = useState(initialDay);
      const [split, setSplit] = useState(() => S.get('gym_split', DEFAULT_GYM_SPLIT));
      const [editing, setEditing] = useState(false);

      const dayData = split[day];
      const todayKey = 'gym_' + new Date().toISOString().slice(0,10);
      const [session, setSession] = useState(() => S.get(todayKey, { date:new Date().toISOString().slice(0,10), day, exercises:{}, started:null, ended:null, durationSec:0 }));

      // Timer
      const [running, setRunning] = useState(!!session.started && !session.ended);
      const [tick, setTick] = useState(0);
      useEffect(() => {
        if (!running) return;
        const i = setInterval(() => setTick(t => t+1), 1000);
        return () => clearInterval(i);
      }, [running]);

      const elapsedSec = (() => {
        if (!session.started) return 0;
        const end = session.ended ? session.ended : Date.now();
        return Math.floor((end - session.started) / 1000) + (running && !session.ended ? 0 : 0);
      })() + (running ? tick * 0 : 0); // tick triggers re-render

      const persist = (s) => { setSession(s); S.set(todayKey, s); };

      const startTimer = () => {
        const s = { ...session, day, started: session.started || Date.now(), ended:null };
        persist(s); setRunning(true);
      };
      const stopTimer = () => {
        const ended = Date.now();
        const dur = Math.floor((ended - (session.started || ended)) / 1000);
        const s = { ...session, ended, durationSec: dur };
        persist(s); setRunning(false);
        // Save to history
        const hist = S.get('gym_history', []);
        hist.unshift({ date:s.date, day:s.day, durationSec:dur, exerciseCount: Object.keys(s.exercises||{}).length });
        S.set('gym_history', hist.slice(0, 60));
      };

      const formatTime = (sec) => {
        const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
        return h > 0 ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}` : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      };

      const updateExercise = (exId, sets) => {
        const s = { ...session, exercises: { ...session.exercises, [exId]: sets } };
        persist(s);
      };

      const addExercise = (name) => {
        const id = 'custom_' + Date.now();
        const next = { ...split, [day]: { ...dayData, exercises: [...dayData.exercises, { id, name, defSets:3, defReps:10 }] } };
        setSplit(next); S.set('gym_split', next);
      };

      const removeExercise = (exId) => {
        const next = { ...split, [day]: { ...dayData, exercises: dayData.exercises.filter(e => e.id !== exId) } };
        setSplit(next); S.set('gym_split', next);
        const newSession = { ...session };
        delete newSession.exercises[exId];
        persist(newSession);
      };

      const renameMuscleGroup = (newName) => {
        const next = { ...split, [day]: { ...dayData, muscle: newName } };
        setSplit(next); S.set('gym_split', next);
      };

      const lastSession = useMemo(() => {
        // Look back up to 14 days for previous session for the same day
        for (let i = 1; i <= 14; i++) {
          const d = new Date(); d.setDate(d.getDate() - i);
          const key = 'gym_' + d.toISOString().slice(0,10);
          const s = S.get(key, null);
          if (s && s.day === day && s.exercises && Object.keys(s.exercises).length) return s;
        }
        return null;
      }, [day, tick === 0]);

      return (

    function ExerciseCard({ ex, editing, onRemove, sets, onSetsChange, lastSets }) {
      const [open, setOpen] = useState(true);

      // ensure sets array of correct length
      const ensuredSets = sets.length ? sets : Array.from({ length: ex.defSets }).map((_, i) => ({
        weight: lastSets[i]?.weight || '', reps: lastSets[i]?.reps || ex.defReps, done: false,
      }));

      const updateSet = (idx, patch) => {
        const next = ensuredSets.map((s, i) => i === idx ? { ...s, ...patch } : s);
        onSetsChange(next);
      };
      const addSet = () => onSetsChange([...ensuredSets, { weight:'', reps: ex.defReps, done: false }]);
      const removeSet = (idx) => onSetsChange(ensuredSets.filter((_, i) => i !== idx));

      const completed = ensuredSets.filter(s => s.done).length;

      return (
        <GlassCard style={{ padding:14, marginBottom:10 }}>
          <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom: open ? 12 : 0 }}>
            <button onClick={() => setOpen(o => !o)} style={{ flex:1, display:'flex', alignItems:'center', gap:10, background:'none', border:'none', color:'var(--text)', cursor:'pointer', padding:0, textAlign:'left' }}>
              <div style={{ width:28, height:28, borderRadius:8, background:'var(--bg-card-2)', display:'flex', alignItems:'center', justifyContent:'center' }}>
                <Icon name={open?'ChevronDown':'ChevronRight'} size={16} strokeWidth={1.5} style={{ color:'var(--text-dim)' }}/>
              </div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:14, fontWeight:600, color:'var(--text)' }}>{ex.name}</div>
                <div style={{ fontSize:11, color:'var(--text-dim)', marginTop:2 }}>
                  {ensuredSets.length} sets {completed > 0 && <span style={{ color:'var(--green)' }}>· {completed} done</span>}
                </div>
              </div>
            </button>
            {editing && (
              <button onClick={onRemove} style={{ background:'rgba(248,113,113,.12)', border:'none', color:'var(--red)', padding:'6px 8px', borderRadius:8, cursor:'pointer', display:'flex' }}>
                <Icon name="Trash2" size={14} strokeWidth={1.5}/>
              </button>
            )}
          </div>

          {open && (
            <div>
              {/* Header row */}
              <div style={{ display:'grid', gridTemplateColumns:'28px 1fr 1fr 36px 32px', gap:8, alignItems:'center', padding:'4px 4px', fontSize:10, color:'var(--text-faint)', textTransform:'uppercase', letterSpacing:'.12em' }}>
                <div>#</div><div>kg</div><div>Reps</div><div></div><div></div>
              </div>
              {ensuredSets.map((s, i) => {
                const last = lastSets[i];
                return (
                  <div key={i} style={{ display:'grid', gridTemplateColumns:'28px 1fr 1fr 36px 32px', gap:8, alignItems:'center', padding:'6px 4px' }}>
                    <div className="mono" style={{ fontSize:13, color:'var(--text-faint)' }}>{i+1}</div>
                    <input
                      inputMode="decimal" value={s.weight}
                      onChange={e => updateSet(i, { weight: e.target.value.replace(/[^0-9.]/g,'') })}
                      placeholder={last?.weight ? String(last.weight) : '0'}
                      style={{ background:'var(--bg-card)', border:'0.5px solid var(--border-soft)', borderRadius:8, padding:'8px 10px', color:'var(--text)', fontSize:14, fontFamily:'Geist Mono,monospace', outline:'none', width:'100%' }}
                    />
                    <input
                      inputMode="numeric" value={s.reps}
                      onChange={e => updateSet(i, { reps: e.target.value })}
                      placeholder={String(ex.defReps)}
                      style={{ background:'var(--bg-card)', border:'0.5px solid var(--border-soft)', borderRadius:8, padding:'8px 10px', color:'var(--text)', fontSize:14, fontFamily:'Geist Mono,monospace', outline:'none', width:'100%' }}
                    />
                    <button onClick={() => updateSet(i, { done: !s.done })}
                      style={{ width:32, height:32, borderRadius:10, border: s.done ? 'none' : '1.5px solid var(--border)', background: s.done ? 'var(--green)' : 'transparent', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
                      {s.done && <Icon name="Check" size={14} strokeWidth={3} style={{ color:'#0a1f12' }}/>}
                    </button>
                    <button onClick={() => removeSet(i)} style={{ background:'none', border:'none', color:'var(--text-faint)', cursor:'pointer', padding:0, display:'flex', justifyContent:'center' }}>
                      <Icon name="X" size={14} strokeWidth={1.5}/>
                    </button>
                  </div>
                );
              })}
              <button onClick={addSet} style={{ marginTop:6, padding:'8px 12px', borderRadius:10, border:'0.5px dashed var(--border)', background:'transparent', color:'var(--text-dim)', fontSize:12, cursor:'pointer', width:'100%', display:'flex', alignItems:'center', justifyContent:'center', gap:6 }}>
                <Icon name="Plus" size={14} strokeWidth={1.5}/> Add set
              </button>
            </div>
          )}
        </GlassCard>
      );
    }

    function AddExerciseInline({ onAdd }) {
      const [val, setVal] = useState('');
      return (
        <div style={{ display:'flex', gap:8, marginTop:8 }}>
          <input value={val} onChange={e => setVal(e.target.value)} placeholder="Add exercise…"
            style={{ flex:1, background:'var(--bg-card)', border:'0.5px dashed var(--border)', borderRadius:10, padding:'10px 12px', color:'var(--text)', fontSize:14, fontFamily:'Plus Jakarta Sans,sans-serif', outline:'none' }}/>
          <button onClick={() => { if (val.trim()) { onAdd(val.trim()); setVal(''); } }}
            style={{ padding:'10px 14px', borderRadius:10, border:'none', background:'linear-gradient(135deg,var(--gold),var(--gold-deep))', color:'#1a0f00', fontWeight:600, fontSize:13, cursor:'pointer' }}>
            Add
          </button>
        </div>
      );
    }

        { id:'home',      label:'Home',      icon:'House'      },
        { id:'protocols', label:'Protocols', icon:'Layers'     },

    /* ── ONBOARDING (10-step health audit) ─────────────────────── */
    const OB_GOALS = [
      { id:'fat_loss',  icon:'🔥', label:'Lose fat',              desc:'Cut body fat, stay muscular',        protocol:'code90'       },
      { id:'muscle',    icon:'💪', label:'Build muscle',           desc:'Structured hypertrophy + recovery',   protocol:'codePhysique' },

    const OB_BARRIERS = [

      { id:'thyroid',  icon:'🟠', label:'Thyroid issue',            desc:'Hypo or hyperthyroid'              },

      { id:'vegan',  icon:'🌱', label:'Vegan'         },

    const OB_EAT_PATTERNS = [
      { id:'3meals', icon:'🍽️',  label:'Three meals a day',      desc:'Breakfast, lunch, dinner — fixed timing' },
      { id:'IF',     icon:'⏱️',  label:'Intermittent fasting',   desc:'16:8 or similar eating window'           },

    ];

    const OB_FITNESS = [
      { id:'sedentary', icon:'🛋️', label:'Sedentary',          desc:'Desk-bound, under 5,000 steps/day' },
      { id:'light',     icon:'🚶', label:'Lightly active',     desc:'Some walking, 5–8k steps'          },
      { id:'moderate',  icon:'🏃', label:'Moderately active',  desc:'Workout 3–4× per week'             },
      { id:'very',      icon:'⚡', label:'Very active',        desc:'Daily intense training'             },
    ];

    function Onboarding({ onComplete }) {
      const TOTAL = 10;
      const [step, setStep] = useState(0);
      const [data, setData] = useState({
        name:'', sex:'',
        goals:[], barrier:'',
        age:'', height:'', weight:'', goalWeight:'',
        conditions:[],
        sleepHours:7, sleepQuality:'', stressLevel:5, fitness:'',
        diet:'', eatPattern:'', digestion:[],
        energyTime:'', stressResponse:'', bodyBuild:'',
        timePerDay:45, gymAccess:'',
      });
      const update = (k, v) => setData(d => ({ ...d, [k]:v }));

      const prakriti = useMemo(() => {
        const s = { vata:0, pitta:0, kapha:0 };
        if (data.bodyBuild === 'lean')   s.vata  += 2;
        if (data.bodyBuild === 'medium') s.pitta += 2;
        if (data.bodyBuild === 'stocky') s.kapha += 2;
        if (data.energyTime === 'evening' || data.energyTime === 'night') s.vata  += 1;
        if (data.energyTime === 'afternoon') s.pitta += 1;
        if (data.energyTime === 'morning')   s.kapha += 1;
        if (data.stressResponse === 'overthink') s.vata  += 2;
        if (data.stressResponse === 'irritable') s.pitta += 2;
        if (data.stressResponse === 'withdraw')  s.kapha += 2;
        if (data.digestion.includes('bloating'))     s.vata  += 1;
        if (data.digestion.includes('acidity'))      s.pitta += 1;
        if (data.digestion.includes('constipation')) s.kapha += 1;
        const max = Math.max(s.vata, s.pitta, s.kapha);
        if (!max) return 'pitta';
        return ['vata','pitta','kapha'].find(k => s[k] === max) || 'pitta';
      }, [data.bodyBuild, data.energyTime, data.stressResponse, data.digestion]);

      const protocolId = useMemo(() => {
        const map = { fat_loss:'code90', muscle:'codePhysique', hair:'codeHair', skin:'codeGlow', energy:'code90', transform:'code90' };
        return map[data.goals[0]] || 'code90';
      }, [data.goals]);

      const canContinue = () => {
        if (step === 0) return true;
        if (step === 1) return data.name.trim().length >= 2 && !!data.sex;
        if (step === 2) return data.goals.length > 0;
        if (step === 3) return !!data.barrier;
        if (step === 4) return !!(data.age && data.height && data.weight);
        if (step === 5) return data.conditions.length > 0;
        if (step === 6) return !!(data.sleepQuality && data.fitness);
        if (step === 7) return !!(data.diet && data.eatPattern && data.digestion.length > 0);
        if (step === 8) return !!(data.energyTime && data.stressResponse && data.bodyBuild);
        if (step === 9) return true;
        return false;
      };

      const next = () => { if (!canContinue()) return; if (step === TOTAL - 1) finish(); else setStep(s => s + 1); };
      const back = () => setStep(s => Math.max(0, s - 1));

      const finish = () => {
        const profile = {
          name: data.name.trim(), sex: data.sex,
          age: Number(data.age)||0, height: Number(data.height)||0,
          weight: Number(data.weight)||0, goalWeight: Number(data.goalWeight)||Number(data.weight)||0,
          activityLevel: data.fitness, diet: data.diet, eatPattern: data.eatPattern,
          goal: data.goals[0]||'transform', goals: data.goals, barrier: data.barrier,
          conditions: data.conditions, sleepHours: data.sleepHours, sleepQuality: data.sleepQuality,
          stressLevel: data.stressLevel, digestion: data.digestion,
          prakriti, energyTime: data.energyTime, stressResponse: data.stressResponse,
          bodyBuild: data.bodyBuild, timePerDay: data.timePerDay, gymAccess: data.gymAccess,
        };
        S.set('profile', profile);
        S.set('protocol_active', protocolId);
        S.set('onboarded', true);
        S.set('startDay', new Date().toISOString());
        if (profile.weight) {
          S.set('weight', { current:profile.weight, target:profile.goalWeight, start:profile.weight, history:[{ d:new Date().toISOString().slice(0,10), w:profile.weight }] });
        }
        onComplete && onComplete();
      };

      const stepNames = ['','About you','Your goal','What stopped you','Your body','Health check','Lifestyle','Food & gut','Your nature','Your protocol'];
      const bg = 'radial-gradient(ellipse 80% 60% at 10% 0%,var(--glow-a),transparent 60%), radial-gradient(ellipse 60% 60% at 90% 110%,var(--glow-b),transparent 60%), var(--bg)';
      const ok = canContinue();
      const firstName = data.name.split(' ')[0];

      return (
        <div style={{ width:'100%', height:'100dvh', display:'flex', flexDirection:'column', background:bg, color:'var(--text)' }}>
          <div className="safe-t" style={{ padding:'16px 20px 8px', display:'flex', alignItems:'center', gap:12 }}>
            {step > 0
              ? <button onClick={back} style={{ background:'none', border:'none', color:'var(--text-dim)', cursor:'pointer', display:'flex', padding:0 }}><Icon name="ChevronLeft" size={22}/></button>
              : <div style={{ width:22 }}/>}
            <div style={{ flex:1 }}>
              <div style={{ height:3, borderRadius:999, background:'var(--border-soft)', overflow:'hidden' }}>
                <div style={{ height:'100%', borderRadius:999, background:'linear-gradient(90deg,var(--gold),var(--gold-deep))', width:`${((step+1)/TOTAL)*100}%`, transition:'width .35s cubic-bezier(.16,1,.3,1)' }}/>
              </div>
              {step > 0 && <div style={{ fontSize:10, color:'var(--text-faint)', marginTop:5, fontWeight:500 }} className="mono">{step}/{TOTAL-1} — {stepNames[step]}</div>}
            </div>
            <div style={{ fontSize:11, color:'var(--text-faint)', minWidth:28, textAlign:'right' }} className="mono">{step+1}/{TOTAL}</div>
          </div>

          <div key={step} className="scroll-y no-bar fade-up" style={{ flex:1, padding:'20px 20px 24px' }}>
            {step === 0 && <OBWelcome/>}
            {step === 1 && <OBName data={data} update={update}/>}
            {step === 2 && <OBGoal data={data} update={update}/>}
            {step === 3 && <OBBarrier data={data} update={update}/>}
            {step === 4 && <OBBody data={data} update={update}/>}
            {step === 5 && <OBHealth data={data} update={update}/>}
            {step === 6 && <OBLifestyle data={data} update={update}/>}
            {step === 7 && <OBFood data={data} update={update}/>}
            {step === 8 && <OBNature data={data} update={update}/>}
            {step === 9 && <OBReveal data={data} protocolId={protocolId} prakriti={prakriti}/>}
          </div>

          <div className="safe-b" style={{ padding:'12px 20px 16px' }}>

    function OBReveal({ data, protocolId, prakriti }) {
      const proto = PROTOCOLS[protocolId] || PROTOCOLS.code90;
      const firstName = data.name.split(' ')[0];
      const PRAKRITI_INFO = {
        vata:  { name:'Vata',  emoji:'🌬️', color:'#60A5FA', desc:'Air & Space — creative, mobile, irregular. Needs grounding, warmth, and routine.', herbs:['Ashwagandha','Shatavari','Bala']        },
        pitta: { name:'Pitta', emoji:'🔥', color:'#FB923C', desc:'Fire & Water — focused, intense, driven. Needs cooling, moderation, and calm.',    herbs:['Brahmi','Amla','Neem']                  },
        kapha: { name:'Kapha', emoji:'🌊', color:'#4ADE80', desc:'Earth & Water — stable, nurturing, slow. Needs stimulation, lightness, movement.',  herbs:['Triphala','Trikatu','Guggul']           },
      };
      const pk = PRAKRITI_INFO[prakriti] || PRAKRITI_INFO.pitta;
      const insights = [];
      const pkInsights = {
        vata:  'Vata constitution — grounding herbs (Ashwagandha, Shatavari) and warm meal timing anchor your protocol.',
        pitta: 'Pitta constitution — cooling herbs (Brahmi, Amla) and anti-inflammatory foods are prioritized.',
        kapha: 'Kapha constitution — metabolic herbs (Triphala, Trikatu) and morning fasting windows are built in.',
      };
      if (prakriti) insights.push(pkInsights[prakriti]);
      if (data.conditions.includes('pcos'))     insights.push('PCOS noted — meal timing adjusted for hormonal balance, spearmint tea added to your herb stack.');
      if (data.conditions.includes('thyroid'))  insights.push('Thyroid noted — selenium-rich foods added, Sarvangasana and Matsyasana in your asana set.');
      if (data.conditions.includes('diabetes')) insights.push('Blood sugar noted — low-glycemic meals, Gymnema Sylvestre added to your protocol.');
      if (data.conditions.includes('bp'))       insights.push('High BP noted — Arjuna bark tea and calming pranayama added to your evening routine.');
      if (data.conditions.includes('stress'))   insights.push('Chronic stress noted — Ashwagandha KSM-66 and Brahmi anchor your herb stack.');
      if (data.stressLevel >= 7 || data.sleepQuality === 'rarely') insights.push('High stress + poor sleep detected — Soma Engine starts in Amrita (deep recovery) mode.');
      if (data.barrier === 'consistency') insights.push('Consistency is your challenge — daily streak, micro-habits, and an evening checklist are built in.');
      if (data.barrier === 'no_plan')     insights.push('No plan before — your 90-day timetable maps every meal, herb, asana, and workout.');
      return (
        <div>
          <div style={{ fontSize:12, color:'var(--gold)', fontWeight:600, letterSpacing:'.15em', textTransform:'uppercase', marginBottom:10 }}>Your protocol</div>
          <div className="serif" style={{ fontSize:36, lineHeight:1.1, marginBottom:6 }}>{firstName ? `${firstName}, meet your system.` : 'Meet your system.'}</div>
          <div style={{ fontSize:13, color:'var(--text-dim)', marginBottom:20, lineHeight:1.5 }}>Built around your body, constitution, and lifestyle.</div>
          <div className="glass" style={{ padding:'20px', marginBottom:14, position:'relative', overflow:'hidden' }}>
            <div style={{ position:'absolute', inset:0, background:`radial-gradient(circle at 80% 0%, ${proto.color}22, transparent 60%)`, pointerEvents:'none' }}/>
            <div style={{ position:'relative', display:'flex', alignItems:'center', gap:14, marginBottom:14 }}>
              <div style={{ width:56, height:56, borderRadius:16, background:`${proto.color}22`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:26, border:`0.5px solid ${proto.color}40`, flexShrink:0 }}>{proto.emoji}</div>
              <div>
                <div className="serif" style={{ fontSize:24, lineHeight:1 }}>{proto.name}</div>
                <div style={{ fontSize:12, color:'var(--text-dim)', marginTop:4 }}>{proto.tagline}</div>
              </div>
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:8 }}>
              {[['90','Days'],['4','Phases'],[`${data.timePerDay}m`,'Per day']].map(([v,l]) => (
                <div key={l} style={{ padding:'10px 8px', borderRadius:12, background:'var(--bg-card-2)', textAlign:'center' }}>
                  <div style={{ fontFamily:'Geist Mono,monospace', fontSize:20, color:'var(--gold)', lineHeight:1 }}>{v}</div>
                  <div style={{ fontSize:10, color:'var(--text-faint)', marginTop:4, textTransform:'uppercase', letterSpacing:'.1em' }}>{l}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{ padding:'14px 16px', borderRadius:16, marginBottom:14, border:`0.5px solid ${pk.color}44`, background:`${pk.color}11` }}>
            <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:8 }}>
              <span style={{ fontSize:22 }}>{pk.emoji}</span>
              <div>
                <div style={{ fontSize:13, fontWeight:700, color:pk.color }}>Your constitution: {pk.name}</div>
                <div style={{ fontSize:11, color:'var(--text-dim)', marginTop:1 }}>{pk.desc}</div>
              </div>
            </div>
            <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
              {pk.herbs.map(h => (
                <span key={h} style={{ fontSize:11, padding:'3px 9px', borderRadius:999, background:`${pk.color}22`, color:'var(--text-dim)', border:`0.5px solid ${pk.color}33` }}>{h}</span>

              <span style={{ fontSize:11, padding:'3px 9px', borderRadius:999, background:'var(--bg-card-2)', color:'var(--text-faint)', border:'0.5px solid var(--border-soft)' }}>+more in protocol</span>
            </div>
          </div>
          {insights.length > 0 && (
            <div style={{ marginBottom:14 }}>
              <div style={{ fontSize:11, textTransform:'uppercase', letterSpacing:'.14em', color:'var(--text-faint)', fontWeight:600, marginBottom:10 }}>Personalized for you</div>
              <div style={{ display:'flex', flexDirection:'column', gap:7 }}>
                {insights.slice(0, 4).map((ins, i) => (
                  <div key={i} style={{ display:'flex', gap:10, padding:'11px 13px', borderRadius:12, background:'var(--bg-card)', border:'0.5px solid var(--border-soft)', fontSize:12, color:'var(--text-dim)', lineHeight:1.5 }}>
                    <span style={{ color:'var(--gold)', flexShrink:0 }}>✓</span>{ins}
                  </div>
                ))}
              </div>
            </div>
          )}
          <div style={{ fontSize:11, color:'var(--text-faint)', textAlign:'center', lineHeight:1.7, padding:'0 8px' }}>
            Data stays on your device. Switch protocols any time from More → Settings.
          </div>
        </div>
      );
    }

    /* ── FULL APP ────────────────────────────────────────────────── */
    function App() {
      const [onboarded, setOnboarded] = useState(() => !!S.get('onboarded', false));
      const [tab,   setTab]   = useState('home');
      const [theme, setTheme] = useState(() => { const t = S.get('theme','dark'); document.documentElement.setAttribute('data-theme',t); return t; });
      const stepData = useStepCounter();

      // Browser / Android back-button support
      useEffect(() => {
        window.history.replaceState({ tab: 'home' }, '');
        const handler = e => { if (e.state?.tab) setTab(e.state.tab); };
        window.addEventListener('popstate', handler);
        return () => window.removeEventListener('popstate', handler);
      }, []);

      if (!onboarded) {
        return <Onboarding onComplete={() => setOnboarded(true)}/>;
      }

      const changeTab = t => {
        if (t === tab) return;
        window.history.pushState({ tab: t }, '');
        setTab(t);
        document.getElementById('svva-scroll')?.scrollTo(0, 0);
      };

      const bg = 'radial-gradient(ellipse 80% 60% at 10% 0%,var(--glow-a),transparent 60%), radial-gradient(ellipse 60% 60% at 90% 110%,var(--glow-b),transparent 60%), var(--bg)';

      return (
        <div style={{ width:'100%', height:'100dvh', display:'flex', flexDirection:'column', background:bg, overflow:'hidden' }}>
          <div id="svva-scroll" style={{ flex:1, overflow:'hidden', display:'flex', flexDirection:'column' }}>
            {tab === 'home'      && <HomeScreen stepData={stepData}/>}
            {tab === 'protocols' && <ProtocolsScreen/>}
            {tab === 'food'      && <FoodScreen/>}
            {tab === 'gym'       && <GymScreen/>}
            {tab === 'more'      && <MoreScreen theme={theme} setTheme={setTheme}/>}
          </div>
          <BottomNav active={tab} onChange={changeTab}/>
        </div>
      );
    }

    try {
      console.log('🚀 SVVA App Loading...');
      console.log('React version:', React.version);
      console.log('Root element:', document.getElementById('root'));
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
      console.log('✅ SVVA App Rendered Successfully!');
    } catch (err) {
      console.error('❌ SVVA Render Error:', err);
      document.getElementById('root').innerHTML = `
        <div style="padding: 40px; color: #F2F0ED; font-family: -apple-system, system-ui, sans-serif;">
          <h1 style="color: #F87171;">⚠️ App Error</h1>
          <p>An error occurred while loading SVVA:</p>
          <pre style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; overflow: auto;">
${err.message}
${err.stack}
          </pre>
          <p style="margin-top: 20px; color: #F2F0ED;">Please try clearing your browser cache or refreshing the page.</p>
        </div>
      `;
    }
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
