    /* Step counter via DeviceMotionEvent */
    function useStepCounter() {
      const todayKey = new Date().toDateString();
      const [data, setData] = useState(() => {
        const saved = S.get('steps', { count:0, date:'' });
        return saved.date === todayKey ? saved : { count:0, date:todayKey };
      });
      const lastMag  = useRef(0);
      const lastTime = useRef(0);
      const [permDenied, setPermDenied] = useState(false);

      const startListening = useCallback(() => {
        const handler = e => {
          const a = e.accelerationIncludingGravity;
          if (!a || a.x == null) return;
          const mag = Math.sqrt(a.x*a.x + a.y*a.y + a.z*a.z);
          const now = Date.now();
          if (mag > 11.5 && lastMag.current <= 11.5 && now - lastTime.current > 280) {
            setData(prev => {
              const next = { count: prev.count + 1, date: todayKey };
              S.set('steps', next);
              return next;
            });
            lastTime.current = now;
          }
          lastMag.current = mag;
        };
        window.addEventListener('devicemotion', handler, { passive:true });
        return () => window.removeEventListener('devicemotion', handler);
      }, []);

      useEffect(() => {
        if (typeof DeviceMotionEvent === 'undefined') return;
        if (typeof DeviceMotionEvent.requestPermission === 'function') {
          // iOS 13+ — caller triggers via requestStepPermission()
          return;
        }
        return startListening();
      }, []);

      const requestStepPermission = useCallback(() => {
        if (typeof DeviceMotionEvent?.requestPermission === 'function') {
          DeviceMotionEvent.requestPermission()
            .then(r => { if (r === 'granted') startListening(); else setPermDenied(true); })
            .catch(() => setPermDenied(true));
        }
      }, [startListening]);

      return {
        steps:    data.count,
        calories: Math.round(data.count * 0.04),
        km:       parseFloat((data.count * 0.0008).toFixed(2)),
        permDenied,
        requestStepPermission,
      };
    }

    /* Countdown / count-up timer */
    function useTimer(initialSeconds = 0, countDown = false) {
      const [elapsed, setElapsed]   = useState(initialSeconds);
      const [running, setRunning]   = useState(false);
      const intervalRef = useRef(null);

      useEffect(() => {
        if (!running) { clearInterval(intervalRef.current); return; }
        intervalRef.current = setInterval(() => {
          setElapsed(prev => {
            if (countDown && prev <= 0) { setRunning(false); return 0; }
            return countDown ? prev - 1 : prev + 1;
          });
        }, 1000);
        return () => clearInterval(intervalRef.current);
      }, [running, countDown]);

      const fmt = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
      return {
        elapsed, running,
        display: fmt(elapsed),
        toggle:  () => setRunning(r => !r),
        reset:   (v = initialSeconds) => { setRunning(false); setElapsed(v); },
        setElapsed,
      };
    }

    /* Voice recognition — Web Speech API */
    function useSpeech() {
      const [transcript, setTranscript] = useState('');
      const [listening,  setListening]  = useState(false);
      const [supported,  setSupported]  = useState(false);
      const recRef = useRef(null);

      useEffect(() => {
        setSupported(!!(window.SpeechRecognition || window.webkitSpeechRecognition));
      }, []);

      const start = useCallback(() => {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) return;
        const rec = new SR();
        rec.lang = 'en-IN';
        rec.continuous = false;
        rec.interimResults = false;
        rec.onresult = e => { setTranscript(e.results[0][0].transcript); setListening(false); };
        rec.onerror  = ()  => setListening(false);
        rec.onend    = ()  => setListening(false);
        recRef.current = rec;
        rec.start();
        setListening(true);
      }, []);

      const stop = useCallback(() => {
        recRef.current?.stop();
        setListening(false);
      }, []);

      return { transcript, listening, supported, start, stop, setTranscript };
    }

    /* Body fat — Navy method (male) */
    const calcBodyFat = (height_cm, waist_cm, neck_cm) => {
      if (!height_cm || !waist_cm || !neck_cm || waist_cm <= neck_cm) return null;
      const bf = 86.010 * Math.log10(waist_cm - neck_cm) - 70.041 * Math.log10(height_cm) + 36.76;
      return parseFloat(Math.max(3, Math.min(50, bf)).toFixed(1));
    };

      const diff = Math.max(0, currentBF - targetBF);
      return { weeks_fast: Math.ceil(diff / 1.0), weeks_safe: Math.ceil(diff / 0.5) };
    };

    function MiniLineChart({ data=[], height=50, color='#F4E4C1', filled=false }) {
      if (!data.length) return null;
      const max = Math.max(...data), min = Math.min(...data), range = max - min || 1;
      const pts = data.map((v,i) => {
        const x = (i/(data.length-1)) * 100;
        const y = 100 - ((v-min)/range) * 90 - 5;
        return `${x},${y}`;
      }).join(' ');
      const fillPts = `0,100 ${pts} 100,100`;
      return (
        <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{ width:'100%', height, display:'block' }}>
          {filled && <polygon points={fillPts} fill={color} opacity="0.08"/>}
          <polyline points={pts} fill="none" stroke={color} strokeWidth="2" vectorEffect="non-scaling-stroke"/>
          <polyline points={pts} fill="none" stroke={color} strokeWidth="5" vectorEffect="non-scaling-stroke" opacity="0.08"/>
        </svg>
      );
    }

    function CircleProgress({ pct=0, size=72, stroke=5, color='#F4E4C1', children }) {
      const r = (size - stroke) / 2;

      return (
        <div style={{ position:'relative', width:size, height:size, flexShrink:0 }}>

            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--border-soft)" strokeWidth={stroke}/>
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
              strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
              style={{ transition:'stroke-dashoffset .5s ease' }}/>
          </svg>
          <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center' }}>
            {children}

    function FastingCard() {
      const [f, setF] = useState(() => {
        const saved = S.get('fasting', { active:false, start:null });
        return saved;
      });
      const [now, setNow] = useState(Date.now());
      const target = 16 * 3600000;

      useEffect(() => {
        if (!f.active) return;
        const t = setInterval(() => setNow(Date.now()), 10000);
        return () => clearInterval(t);
      }, [f.active]);

      const elapsed = f.active && f.start ? Math.max(0, now - f.start) : 0;
      const pct = Math.min(100, (elapsed / target) * 100);
      const hh = Math.floor(elapsed / 3600000);
      const mm = Math.floor((elapsed % 3600000) / 60000);

      const toggle = () => {
        const n = f.active ? { active:false, start:null } : { active:true, start:Date.now() };
        setF(n); S.set('fasting', n);
      };

      return (
        <GlassCard style={{ padding:20, marginBottom:12 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
            <div>
              <div style={{ fontSize:10, textTransform:'uppercase', letterSpacing:'0.18em', color:'var(--text-faint)' }}>Intermittent Fast</div>
              <div className="serif" style={{ fontSize:28, lineHeight:1, marginTop:4, color: elapsed>=target?'var(--green)':'var(--gold)' }}>
                {hh}h {String(mm).padStart(2,'0')}m
              </div>
            </div>
            <button onClick={toggle} style={{
              padding:'8px 16px', borderRadius:999, fontSize:12, fontWeight:500, cursor:'pointer', border:'none',
              background: f.active ? 'rgba(244,228,193,0.2)' : 'linear-gradient(135deg,var(--gold),var(--gold-deep))',
              color: f.active ? 'var(--gold)' : '#1a0f00',
            }}>
              {f.active ? '⏸ Eating' : '▶ Fast'}
            </button>
          </div>
          <ProgressBar value={elapsed} max={target} color={elapsed>=target?'var(--green)':'var(--gold)'}/>
          <div style={{ display:'flex', justifyContent:'space-between', fontSize:10, color:'var(--text-faint)', marginTop:6 }}>
            <span>0h</span>
            <span>16h target {elapsed>=target?'✓ Done!':''}</span>
          </div>
        </GlassCard>
      );
    }

    function fuzzyMatch(query, name) {
      const q = query.toLowerCase().trim();
      const n = name.toLowerCase();
      if (!q) return true;
      if (n.includes(q)) return true;
      return q.split('').every(c => n.includes(c));
    }

    function MineralBar({ mineral, intake }) {
      const pct = Math.min(100, (intake / mineral.target) * 100);
      const status = pct >= 100 ? 'met' : pct >= 60 ? 'partial' : 'low';
      const statusColor = status === 'met' ? 'var(--green)' : status === 'partial' ? 'var(--orange)' : 'var(--red)';
      return (
        <div style={{ marginBottom:14 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:6 }}>
            <div style={{ display:'flex', alignItems:'center', gap:6 }}>
              <Icon name={mineral.icon} size={13} style={{ color: mineral.color }}/>
              <span style={{ fontSize:12, color:'var(--text-dim)' }}>{mineral.label}</span>
              {pct < 60 && <span style={{ fontSize:9, background:'rgba(255,112,144,0.15)', color:'var(--red)', padding:'2px 6px', borderRadius:999, border:'0.5px solid rgba(255,112,144,0.3)' }}>Low</span>}
            </div>
            <span style={{ fontSize:11, color: mineral.color, fontWeight:500 }}>{intake.toFixed(1)} / {mineral.target} {mineral.unit}</span>
          </div>
          <div className="bar-track">
            <div className="bar-fill" style={{ width:`${pct}%`, background:`linear-gradient(90deg,${mineral.color}80,${mineral.color})` }}/>
          </div>
          {pct < 60 && (
            <div style={{ fontSize:10, color:'var(--text-faint)', marginTop:4 }}>
              {mineral.key === 'iron'      && 'Eat: black sesame, masoor dal, pumpkin seeds'}
              {mineral.key === 'potassium' && 'Eat: rajma, banana, coconut water, almonds'}
              {mineral.key === 'zinc'      && 'Eat: pumpkin seeds, black sesame, oats'}
              {mineral.key === 'magnesium' && 'Eat: pumpkin seeds, flaxseeds, almonds, ragi'}
            </div>
          )}
        </div>
      );
    }

    function PranayamaTab() {
      const [active, setActive] = useState(null);
      const [phase, setPhase]   = useState('inhale');
      const [beat, setBeat]     = useState(0);
      const timer = useTimer(0, false);

      const start = p => { setActive(p); setPhase('inhale'); setBeat(0); timer.reset(0); timer.toggle(); };
      const stop  = () => { timer.reset(0); setActive(null); };

      useEffect(() => {
        if (!active || !timer.running) return;
        const pat = active.pattern;
        const cycle = Object.values(pat).reduce((a,b)=>a+b,0);
        const pos = timer.elapsed % cycle;
        let acc = 0;
        for (const [k,v] of Object.entries(pat)) {
          acc += v;
          if (pos < acc) { setPhase(k); break; }
        }
        setBeat(timer.elapsed);
      }, [timer.elapsed, active, timer.running]);

      const phaseLabel = { inhale:'Inhale', hold:'Hold', exhale:'Exhale', hum:'Hum...', pause:'Rest' };
      const phaseColor = { inhale:'var(--blue)', hold:'var(--purple)', exhale:'var(--green)', hum:'var(--gold)', pause:'var(--text-faint)' };

      return (
        <div>
          <div style={{ fontSize:13, color:'var(--text-faint)', lineHeight:1.6, marginBottom:20 }}>

              <div className="breathe" style={{ width:100, height:100, borderRadius:999, margin:'0 auto 20px',
                background: `radial-gradient(circle, ${phaseColor[phase]}30, transparent)`,
                border:`2px solid ${phaseColor[phase]}60`,
                display:'flex', alignItems:'center', justifyContent:'center' }}>
                <div style={{ fontSize:16, fontWeight:600, color: phaseColor[phase] }}>{phaseLabel[phase] || phase}</div>
              </div>

              <div className="mono" style={{ fontSize:40, color:'var(--gold)', marginBottom:4 }}>{timer.display}</div>
              <div style={{ fontSize:11, color:'var(--text-faint)', marginBottom:20 }}>
                {Math.floor(active.dur/60)} min session
              </div>
              <ProgressBar value={timer.elapsed} max={active.dur} color={active.color}/>
              <div style={{ marginTop:14, padding:'12px', borderRadius:12, background:'var(--bg-card)', textAlign:'left' }}>
                <div style={{ fontSize:11, color:'var(--text-dim)', lineHeight:1.6 }}>{active.instruction}</div>
              </div>
              <div style={{ display:'flex', gap:10, marginTop:14 }}>
                <button onClick={timer.toggle} style={{ flex:1, padding:'11px', borderRadius:12, background:'var(--bg-card)', border:'0.5px solid var(--border)', color:'var(--text)', fontSize:13, cursor:'pointer' }}>
                  {timer.running ? '⏸ Pause' : '▶ Resume'}
                </button>
                <button onClick={stop} style={{ flex:1, padding:'11px', borderRadius:12, background:`${active.color}20`, border:`0.5px solid ${active.color}40`, color:active.color, fontWeight:600, fontSize:13, cursor:'pointer' }}>
                  ✓ Done
                </button>
              </div>
            </GlassCard>
          )}

          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            {PRANAYAMA.map(p => (
              <GlassCard key={p.id} style={{ padding:18 }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:10 }}>
                  <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                    <span style={{ fontSize:28 }}>{p.emoji}</span>
                    <div>
                      <div style={{ fontSize:14, fontWeight:500 }}>{p.name}</div>
                      <div style={{ fontSize:10, color:'var(--text-faint)', marginTop:2 }}>{Math.floor(p.dur/60)} min</div>
                    </div>
                  </div>
                  <button onClick={() => start(p)}
                    style={{ padding:'7px 16px', borderRadius:999, background:`${p.color}20`, border:`0.5px solid ${p.color}40`, color:p.color, fontWeight:600, fontSize:12, cursor:'pointer', flexShrink:0 }}>
                    Begin
                  </button>
                </div>
                <div style={{ fontSize:12, color:'var(--text-dim)', lineHeight:1.5 }}>{p.benefit}</div>
              </GlassCard>
            ))}
          </div>
        </div>
      );
    }

    function AnalyticsTab() {
      const sleepData  = S.get('sleep', { history:[6.5,7.1,6.8,7.4,7.2,6.9,7.2] });
      const weightData = S.get('weight', { history:[84.5,83.8,83.2,82.5,81.8,81.5,81.2], current:81.2, start:84.5 });
      const steps      = S.get('steps', { count:0 });
      const water      = S.get('water', { glasses:0, goal:8 });
      const todayFood  = S.get('food_' + todayKey(), []);
      const totals     = todayFood.reduce((a,e) => ({ cal:a.cal+(e.cal||0), p:a.p+(e.p||0) }), { cal:0, p:0 });

      const avgSleep = sleepData.history.length
        ? (sleepData.history.reduce((a,b)=>a+b,0)/sleepData.history.length).toFixed(1) : '–';
      const weightLost = weightData.start ? (weightData.start - weightData.current).toFixed(1) : '–';

      return (
        <div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:16 }}>
            {[
              ['Avg Sleep', `${avgSleep}h`, 'var(--purple)', 'Moon'],
              ['Steps Today', steps.count.toLocaleString(), 'var(--orange)', 'Footprints'],
              ['Kcal Today', Math.round(totals.cal), 'var(--gold)', 'Utensils'],
              ['Weight Lost', `${weightLost}kg`, 'var(--green)', 'TrendingDown'],
            ].map(([label, val, color, icon]) => (
              <GlassCard key={label} style={{ padding:16 }}>
                <Icon name={icon} size={16} style={{ color, marginBottom:8 }}/>
                <div style={{ fontSize:9, textTransform:'uppercase', color:'var(--text-faint)', letterSpacing:'0.12em' }}>{label}</div>
                <div className="serif" style={{ fontSize:26, lineHeight:1.1, marginTop:4, color }}>{val}</div>
              </GlassCard>
            ))}
          </div>

          <SectionLabel>Sleep — 7-Day Trend</SectionLabel>
          <GlassCard style={{ padding:18, marginBottom:10 }}>
            <MiniLineChart data={sleepData.history} height={60} color="var(--purple)" filled/>
            <div style={{ display:'flex', justifyContent:'space-between', fontSize:10, color:'var(--text-faint)', marginTop:6 }}>
              <span>7 days ago</span><span>Today</span>
            </div>
          </GlassCard>

          <SectionLabel>Weight Trend</SectionLabel>
          <GlassCard style={{ padding:18, marginBottom:10 }}>
            <MiniLineChart data={weightData.history} height={60} color="var(--orange)" filled/>
            <div style={{ display:'flex', justifyContent:'space-between', fontSize:10, color:'var(--text-faint)', marginTop:6 }}>
              <span>Start</span><span>Now</span>
            </div>
          </GlassCard>

          <SectionLabel>Today's Minerals</SectionLabel>
          <GlassCard style={{ padding:18, marginBottom:10 }}>
            {MINERALS.map(m => {
              const intake = todayFood.reduce((a,e) => a+(e[m.key]||0), 0);
              return <MineralBar key={m.key} mineral={m} intake={intake}/>;
            })}
          </GlassCard>

          <SectionLabel>Water Today</SectionLabel>
          <GlassCard style={{ padding:18, marginBottom:4 }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
              <div className="serif" style={{ fontSize:28, color:'var(--blue)' }}>{water.glasses}<span style={{ fontSize:16, color:'var(--text-faint)' }}>/{water.goal}</span></div>
              <div style={{ fontSize:12, color:'var(--text-faint)' }}>{Math.round((water.glasses/water.goal)*100)}% of goal</div>
            </div>
            <ProgressBar value={water.glasses} max={water.goal} color="var(--blue)"/>
          </GlassCard>
        </div>
      );
    }

    function SettingsTab({ theme, setTheme }) {
      const exportData = () => {
        try {
          const data = {};
          Object.keys(localStorage).filter(k => k.startsWith('svva_')).forEach(k => { data[k] = localStorage.getItem(k); });
          const str = JSON.stringify(data, null, 2);
          navigator.clipboard?.writeText(str).then(() => alert('Data copied to clipboard!'));
        } catch { alert('Open browser console → copy localStorage manually.'); }
      };

      return (
        <div>
          <GlassCard style={{ padding:20, marginBottom:12 }}>
            <div style={{ fontSize:13, fontWeight:500, marginBottom:16 }}>Theme</div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
              {[['dark','🌑 Dark'],['white','☀️ White']].map(([t,label]) => (
                <button key={t} onClick={() => { setTheme(t); document.documentElement.setAttribute('data-theme', t); S.set('theme', t); }}
                  style={{ padding:'14px', borderRadius:14, cursor:'pointer', fontWeight:600, fontSize:13,
                    background: theme===t ? 'linear-gradient(135deg,var(--gold),var(--gold-deep))' : 'var(--bg-card)',
                    color: theme===t ? '#1a0f00' : 'var(--text-dim)',
                    border:`0.5px solid ${theme===t ? 'var(--gold)' : 'var(--border-soft)'}` }}>
                  {label}
                </button>
              ))}
            </div>
          </GlassCard>

          <GlassCard style={{ padding:20, marginBottom:12 }}>
            <div style={{ fontSize:13, fontWeight:500, marginBottom:12 }}>Data</div>
            {[
              ['✅ Stored locally on your device', 'var(--green)'],
              ['✅ Works offline — no internet needed', 'var(--green)'],
              ['✅ No accounts, no cloud sync', 'var(--green)'],
              ['📱 Add to Home Screen for app-like use', 'var(--text-dim)'],
            ].map(([t,c]) => (
              <div key={t} style={{ fontSize:12, color:c, padding:'5px 0', borderBottom:'0.5px solid var(--border-soft)' }}>{t}</div>
            ))}
          </GlassCard>

          <GlassCard style={{ padding:20, marginBottom:12 }}>
            <div style={{ fontSize:13, fontWeight:500, marginBottom:12 }}>Backup</div>
            <button onClick={exportData}
              style={{ width:'100%', padding:'12px', borderRadius:12, background:'var(--bg-card)', border:'0.5px solid var(--border)', color:'var(--gold)', fontSize:13, cursor:'pointer', marginBottom:10 }}>
              📋 Export all data (copy JSON)
            </button>
            <div style={{ fontSize:11, color:'var(--text-faint)', lineHeight:1.5 }}>
              Paste in Notes or email for backup. Import: open console → paste to localStorage.
            </div>
          </GlassCard>

          <button onClick={() => { if (confirm('Delete all SVVA data? This cannot be undone.')) { S.clear(); window.location.reload(); } }}
            style={{ width:'100%', padding:'13px', borderRadius:14, background:'rgba(255,112,144,0.12)', border:'0.5px solid rgba(255,112,144,0.3)', color:'var(--red)', fontWeight:600, fontSize:13, cursor:'pointer' }}>
            🗑 Clear All Data
          </button>
        </div>
      );
    }

    function MoreScreen({ theme, setTheme }) {
      const [tab, setTab] = useState('drinks');
      const tabs = [['drinks','Drinks','🌿'],['asanas','Asanas','🧘'],['pranayama','Breath','🌬️'],['analytics','Analytics','📊'],['settings','Settings','⚙️']];

      return (
        <div style={{ height:'100%', display:'flex', flexDirection:'column' }}>
          <div className="safe-t" style={{ padding:'0 20px', paddingTop:'max(16px,env(safe-area-inset-top))' }}>
            <div style={{ paddingTop:8 }}>
              <div className="serif" style={{ fontSize:32, lineHeight:1.1 }}>More</div>
            </div>
            <div className="h-pills" style={{ padding:'14px 0 4px' }}>
              {tabs.map(([k,l,e]) => (
                <button key={k} onClick={() => setTab(k)}
                  style={{ flexShrink:0, padding:'7px 14px', borderRadius:999, fontSize:12, fontWeight:500, cursor:'pointer',
                    background: tab===k ? 'linear-gradient(135deg,var(--gold),var(--gold-deep))' : 'var(--bg-card)',
                    color: tab===k ? '#1a0f00' : 'var(--text-dim)',
                    border:`0.5px solid ${tab===k ? 'var(--gold)' : 'var(--border-soft)'}` }}>
                  {e} {l}
                </button>
              ))}
            </div>
          </div>
          <div className="scroll-y no-bar" style={{ flex:1, padding:'8px 20px', paddingBottom:100 }}>
            {tab === 'drinks'    && <DrinksTab/>}
            {tab === 'asanas'    && <AsanasTab/>}
            {tab === 'pranayama' && <PranayamaTab/>}
            {tab === 'analytics' && <AnalyticsTab/>}
            {tab === 'settings'  && <SettingsTab theme={theme} setTheme={setTheme}/>}
          </div>
        </div>
      );
    }

    /* ── BOTTOM NAV ──────────────────────────────────────────────── */
    function BottomNav({ active, onChange }) {
      const tabs = [
        { id:'home',      label:'Home',      icon:'House'      },
        { id:'protocols', label:'Protocols', icon:'BookOpen'   },
        { id:'food',      label:'Food',      icon:'Utensils'   },
        { id:'body',      label:'Body',      icon:'Activity'   },
        { id:'more',      label:'More',      icon:'LayoutGrid' },
      ];
      return (
        <div className="safe-b" style={{ position:'fixed', bottom:0, left:0, right:0, zIndex:50, padding:'0 16px', paddingBottom:'max(16px,env(safe-area-inset-bottom))' }}>
          <div className="nav-glass" style={{ borderRadius:28, display:'flex' }}>
            {tabs.map(t => (
              <button key={t.id} onClick={() => onChange(t.id)}
                style={{ flex:1, padding:'10px 4px 8px', display:'flex', flexDirection:'column', alignItems:'center', gap:4, background:'none', border:'none', cursor:'pointer', position:'relative' }}>
                {active === t.id && (
                  <div style={{ position:'absolute', top:0, left:'50%', transform:'translateX(-50%)', width:28, height:2, borderRadius:999, background:'linear-gradient(90deg,transparent,var(--gold),transparent)' }}/>
                )}
                <Icon name={t.icon} size={20} strokeWidth={active===t.id ? 2 : 1.5}
                  style={{ color: active===t.id ? 'var(--gold)' : 'var(--text-faint)', transition:'color .2s' }}/>
                <span style={{ fontSize:9, letterSpacing:'0.06em', color: active===t.id ? 'var(--gold)' : 'var(--text-faint)', fontWeight: active===t.id ? 600 : 400, transition:'color .2s' }}>
                  {t.label}
                </span>
              </button>
            ))}
          </div>
        </div>
      );
    }

    /* ── FULL APP ────────────────────────────────────────────────── */
    function App() {
      const [tab,   setTab]   = useState('home');
      const [theme, setTheme] = useState(() => { const t = S.get('theme','dark'); document.documentElement.setAttribute('data-theme',t); return t; });
      const stepData = useStepCounter();

      const changeTab = t => {
        setTab(t);
        document.getElementById('svva-scroll')?.scrollTo(0, 0);
      };

      const bg = 'radial-gradient(ellipse 80% 60% at 10% 0%,var(--glow-a),transparent 60%), radial-gradient(ellipse 60% 60% at 90% 110%,var(--glow-b),transparent 60%), var(--bg)';

      return (
        <div style={{ width:'100%', height:'100dvh', display:'flex', flexDirection:'column', background:bg, overflow:'hidden' }}>
          <div id="svva-scroll" style={{ flex:1, overflow:'hidden', display:'flex', flexDirection:'column' }}>
            {tab === 'home'      && <HomeScreen stepData={stepData}/>}
            {tab === 'protocols' && <ProtocolsScreen/>}
            {tab === 'food'      && <FoodScreen/>}
            {tab === 'body'      && <BodyScreen/>}
            {tab === 'more'      && <MoreScreen theme={theme} setTheme={setTheme}/>}
          </div>
          <BottomNav active={tab} onChange={changeTab}/>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
